name: Build and Publish CUDA Wheels

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      use_testpypi:
        description: 'Upload to TestPyPI instead of PyPI'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda: "11.8.0"
            cuda_short: "118"
            torch: "2.1.0"
            python: "3.10"
          - cuda: "11.8.0"
            cuda_short: "118"
            torch: "2.1.0"
            python: "3.11"
          - cuda: "12.1.0"
            cuda_short: "121"
            torch: "2.3.0"
            python: "3.10"
          - cuda: "12.1.0"
            cuda_short: "121"
            torch: "2.3.0"
            python: "3.11"
          - cuda: "12.4.0"
            cuda_short: "124"
            torch: "2.5.0"
            python: "3.10"
          - cuda: "12.4.0"
            cuda_short: "124"
            torch: "2.5.0"
            python: "3.11"
          - cuda: "11.8.0"
            cuda_short: "118"
            torch: "2.2.0"
            python: "3.12"
          - cuda: "12.1.0"
            cuda_short: "121"
            torch: "2.3.0"
            python: "3.12"
          - cuda: "12.4.0"
            cuda_short: "124"
            torch: "2.5.0"
            python: "3.12"

    container:
      image: nvidia/cuda:${{ matrix.cuda }}-devel-ubuntu22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore wheel cache
        id: cache-wheel
        uses: actions/cache@v4
        with:
          path: fused_ops/dist
          key: wheel-cu${{ matrix.cuda_short }}-torch${{ matrix.torch }}-py${{ matrix.python }}-${{ hashFiles('fused_ops/src/**', 'fused_ops/include/**', 'fused_ops/setup.py', 'fused_ops/pyproject.toml') }}

      - name: Install system deps
        if: steps.cache-wheel.outputs.cache-hit != 'true'
        run: |
          apt-get update -q
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends software-properties-common tzdata
          if [ "${{ matrix.python }}" = "3.12" ]; then
            add-apt-repository -y ppa:deadsnakes/ppa
            apt-get update -q
          fi
          apt-get install -y --no-install-recommends \
            python${{ matrix.python }} \
            python${{ matrix.python }}-dev \
            curl \
            git
          update-alternatives --install /usr/bin/python python \
            /usr/bin/python${{ matrix.python }} 1
          update-alternatives --install /usr/bin/python3 python3 \
            /usr/bin/python${{ matrix.python }} 1
          curl -sS https://bootstrap.pypa.io/get-pip.py | python

      - name: Install PyTorch
        if: steps.cache-wheel.outputs.cache-hit != 'true'
        run: |
          python -m pip install --no-cache-dir \
            torch==${{ matrix.torch }} \
            --index-url https://download.pytorch.org/whl/cu${{ matrix.cuda_short }}

      - name: Install build tools
        if: steps.cache-wheel.outputs.cache-hit != 'true'
        run: python -m pip install --no-cache-dir wheel setuptools ninja

      - name: Build wheel
        if: steps.cache-wheel.outputs.cache-hit != 'true'
        working-directory: fused_ops
        env:
          CUDA_VERSION: ${{ matrix.cuda_short }}
          TORCH_CUDA_ARCH_LIST: "7.0;7.5;8.0;8.6;8.9;9.0"
          FORCE_CUDA: "1"
        run: python -m pip wheel . --no-deps --no-build-isolation -w dist

      - name: Retag wheel as manylinux
        if: steps.cache-wheel.outputs.cache-hit != 'true'
        working-directory: fused_ops/dist
        shell: bash
        run: |
          for f in *.whl; do
            mv "$f" "${f/linux_x86_64/manylinux2014_x86_64}"
          done

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-cu${{ matrix.cuda_short }}-py${{ matrix.python }}
          path: fused_ops/dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: all_wheels/
          merge-multiple: true

      - name: List wheels
        run: find all_wheels/ -name "*.whl" | sort

      - name: Publish to PyPI / TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ github.event.inputs.use_testpypi == 'true' && secrets.TEST_PYPI_API_TOKEN || secrets.PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ github.event.inputs.use_testpypi == 'true' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: |
          pip install twine
          twine upload --verbose --skip-existing all_wheels/*.whl
