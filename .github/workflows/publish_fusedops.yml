name: Build and Publish CUDA Wheels

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda: "11.8.0"
            cuda_short: "118"
            torch: "2.1.0"
            python: "3.10"
          - cuda: "11.8.0"
            cuda_short: "118"
            torch: "2.1.0"
            python: "3.11"
          - cuda: "12.1.0"
            cuda_short: "121"
            torch: "2.3.0"
            python: "3.10"
          - cuda: "12.1.0"
            cuda_short: "121"
            torch: "2.3.0"
            python: "3.11"
          - cuda: "12.4.0"
            cuda_short: "124"
            torch: "2.5.0"
            python: "3.10"
          - cuda: "12.4.0"
            cuda_short: "124"
            torch: "2.5.0"
            python: "3.11"

    container:
      image: nvidia/cuda:${{ matrix.cuda }}-devel-ubuntu22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends \
            python${{ matrix.python }} \
            python${{ matrix.python }}-dev \
            python${{ matrix.python }}-distutils \
            python3-pip \
            curl \
            git
          update-alternatives --install /usr/bin/python python \
            /usr/bin/python${{ matrix.python }} 1
          update-alternatives --install /usr/bin/python3 python3 \
            /usr/bin/python${{ matrix.python }} 1
          curl -sS https://bootstrap.pypa.io/get-pip.py | python

      - name: Install PyTorch
        run: |
          pip install --no-cache-dir \
            torch==${{ matrix.torch }} \
            --index-url https://download.pytorch.org/whl/cu${{ matrix.cuda_short }}

      - name: Install build tools
        run: pip install --no-cache-dir wheel setuptools ninja

      - name: Build wheel
        working-directory: fused_ops
        env:
          CUDA_VERSION: ${{ matrix.cuda_short }}
          TORCH_CUDA_ARCH_LIST: "7.0;7.5;8.0;8.6;8.9;9.0"
          FORCE_CUDA: "1"
        run: python setup.py bdist_wheel

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-cu${{ matrix.cuda_short }}-py${{ matrix.python }}
          path: fused_ops/dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: all_wheels/
          merge-multiple: true

      - name: List wheels
        run: find all_wheels/ -name "*.whl" | sort

      - name: Publish to PyPI
        run: |
          pip install twine
          # twine will route each wheel to the correct PyPI project based on
          # the package name baked into the wheel by setup.py (fireants-fused-ops-cu118 etc.)
          # All projects must be pre-created on pypi.org under your account.
          twine upload all_wheels/*.whl \
            --username __token__ \
            --password ${{ secrets.PYPI_API_TOKEN }}
